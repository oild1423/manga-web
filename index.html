<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manga Web</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:#1a1a1a;
padding:15px;
font-size:24px;
text-align:center;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
padding:20px;
justify-content:center;
}

.card{
background:#1e1e1e;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:280px;
object-fit:cover;
}

.title{
padding:10px;
font-size:14px;
text-align:center;
}

a{
text-decoration:none;
color:white;
}

</style>
</head>

<body>

<div class="header">
📚 Manga Reader
</div>

<div class="container">

<a href="#">
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/0/0f/OnePiece61Cover.png">
<div class="title">One Piece</div>
</div>
</a>

<a href="#">
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/9/9a/Attack_on_Titan_cover.jpg">
<div class="title">Attack on Titan</div>
</div>
</a>

<a href="#">
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/5/5a/NarutoCoverTankobon1.jpg">
<div class="title">Naruto</div>
</div>
</a>

<a href="#">
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/7/7e/Demon_Slayer_-_Kimetsu_no_Yaiba%2C_volume_1.jpg">
<div class="title">Demon Slayer</div>
</div>
</a>

</div>

</body>
</html>
